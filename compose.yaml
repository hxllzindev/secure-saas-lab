services:
  app:
    build:
      context: .
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:3000
      TOKEN_SECRET: ${TOKEN_SECRET:?TOKEN_SECRET must be set to a unique secret with at least 32 characters}
    ports:
      - "3000:3000"
    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - frontend

networks:
  frontend: {}
