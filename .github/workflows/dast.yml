name: DAST

on:
  workflow_dispatch:
  schedule:
    - cron: "41 5 * * 3"

permissions:
  contents: read
  issues: write

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker compose up -d --build
        env:
          TOKEN_SECRET: ci-only-token-secret-with-more-than-32-characters
      - run: |
          for attempt in {1..30}; do
            curl --fail http://127.0.0.1:3000/api/health && exit 0
            sleep 2
          done
          exit 1
      - uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://127.0.0.1:3000
          rules_file_name: .zap/rules.tsv
          cmd_options: -a
