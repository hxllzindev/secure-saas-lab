name: CI and security gates

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm audit --audit-level=high

  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.125.0
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: semgrep scan --config p/javascript --config p/owasp-top-ten --error

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: false
          load: true
          tags: secure-saas-lab:ci
      - uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: secure-saas-lab:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: secure-saas-lab:ci
          artifact-name: secure-saas-lab.spdx.json

  stack-integration:
    runs-on: ubuntu-latest
    env:
      TOKEN_SECRET: ${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - name: Start isolated stack
        run: docker compose up -d --build
      - name: Wait for healthcheck
        run: |
          for attempt in {1..30}; do
            curl --fail http://127.0.0.1:3000/api/health && exit 0
            sleep 2
          done
          docker compose logs
          exit 1
      - name: Verify application controls
        run: node scripts/verify-stack.mjs
      - name: Verify PostgreSQL RLS directly
        run: |
          visible=$(docker compose exec -T database psql \
            postgresql://aegis_app:aegis_app_dev@127.0.0.1:5432/secure_saas \
            -Atc "BEGIN; SELECT set_config('app.tenant_id','acme',true); SELECT count(*) FROM invoices WHERE tenant_id='orbit'; COMMIT;" \
            | grep -E '^[0-9]+$' | tail -1)
          test "$visible" = "0"
      - name: Collect logs
        if: failure()
        run: docker compose logs
      - name: Stop stack
        if: always()
        run: docker compose down -v
