name: CI and security gates

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore SecureSaasLab.sln
      - run: dotnet build SecureSaasLab.sln --configuration Release --no-restore
      - run: dotnet test SecureSaasLab.sln --configuration Release --no-build
      - run: python3 -B scripts/frontend-security-test.py

  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.125.0
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: semgrep scan --config p/csharp --config p/owasp-top-ten --error

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: false
          load: true
          tags: secure-saas-lab:ci
      - uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: secure-saas-lab:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: secure-saas-lab:ci
          artifact-name: secure-saas-lab.spdx.json

  stack-integration:
    runs-on: ubuntu-latest
    env:
      TOKEN_SECRET: ${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Start isolated stack
        run: docker compose up -d --build
      - name: Wait for healthcheck
        run: |
          for attempt in {1..30}; do
            curl --fail http://127.0.0.1:3000/api/health && exit 0
            sleep 2
          done
          docker compose logs
          exit 1
      - name: Verify application controls
        run: |
          secure_login=$(curl --fail -i -s http://127.0.0.1:3000/api/secure/login \
            -H 'Content-Type: application/json' \
            --data '{"email":"ana@acme.test","password":"Secure123!","mfaCode":"482911"}')
          echo "$secure_login" | grep -q 'HttpOnly'
          vulnerable_login=$(curl --fail -s http://127.0.0.1:3000/api/vulnerable/login \
            -H 'Content-Type: application/json' \
            --data '{"email":"ana@acme.test","password":"Secure123!","mfaCode":""}')
          token=$(echo "$vulnerable_login" | sed -n 's/.*"token":"\([^"]*\)".*/\1/p')
          curl --fail http://127.0.0.1:3000/api/vulnerable/invoices/inv-2001 \
            -H "Authorization: Bearer $token" | grep -q '"tenantId":"orbit"'
      - name: Collect logs
        if: failure()
        run: docker compose logs
      - name: Stop stack
        if: always()
        run: docker compose down -v
